version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "daily"
      time: "20:00"
      timezone: "Europe/Riga"
    labels:
      - "py-deps"
    open-pull-requests-limit: 10

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "daily"
      time: "20:00"
      timezone: "Europe/Riga"
    labels:
      - "gh-deps"
    open-pull-requests-limit: 10