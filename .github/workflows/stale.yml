name: Stale

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          days-before-stale: 5
          days-before-close: 14
          stale-issue-label: stale
          stale-pr-label: stale
          stale-issue-message: "This issue has been inactive for 5 days and will be closed in 14 days."
          stale-pr-message: "This PR has been inactive for 5 days and will be closed in 14 days."
          close-issue-message: "This issue has been closed due to inactivity."
          close-pr-message: "This PR has been closed due to inactivity."
          operations-per-run: 3